<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ступень 1 | Ба Цзы — зеркало судьбы</title>
    <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Zen+Old+Mincho&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #fefef9;
            --bg-card: #fff9ef;
            --border-card: 1px solid #ece0cc;
            --border-divider: 1px solid #e8e0d0;
            --radius-card: 30px;
            --shadow-card: 0 8px 20px rgba(0, 0, 0, 0.05);
            --font-serif: 'Spectral', 'Times New Roman', Georgia, serif;
            --font-chinese: 'Zen Old Mincho', 'Noto Serif SC', serif;
            --text-primary: #2f2a22;
            --text-secondary: #5a4d3b;
            --text-accent: #a56b3a;
            --text-chinese: #9f7657;
            --text-muted: #aa9f8a;
            --accent-border: #d6b07a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-page); font-family: var(--font-serif); color: var(--text-primary); min-height: 100vh; padding: 2rem; }
        .container { max-width: 820px; margin: 0 auto; }
        .module-card { background: var(--bg-card); border-radius: var(--radius-card); border: var(--border-card); box-shadow: var(--shadow-card); overflow: hidden; }
        .module-image { width: 100%; height: 200px; object-fit: cover; background: #2a241a; }
        .module-content { padding: 2rem; }
        .back-link { display: inline-block; margin-bottom: 1.5rem; font-size: 0.85rem; color: var(--text-muted); text-decoration: none; }
        .back-link:hover { color: var(--text-accent); }
        .stage-number { font-family: var(--font-chinese); font-size: 1rem; color: var(--text-chinese); letter-spacing: 2px; }
        .stage-title { font-family: var(--font-chinese); font-size: 2rem; font-weight: 500; color: var(--text-accent); margin: 0.5rem 0 0.25rem; }
        .stage-subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: var(--border-divider); }
        .lessons-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .lesson-row { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; border-bottom: 0.5px dotted #dfd1be; flex-wrap: wrap; gap: 1rem; }
        .lesson-info { display: flex; align-items: baseline; gap: 1rem; flex: 1; }
        .lesson-number { font-family: var(--font-chinese); font-size: 0.8rem; color: var(--text-chinese); min-width: 2rem; }
        .lesson-title { font-size: 0.95rem; color: var(--text-primary); }
        .lesson-title-main { font-weight: 500; }
        .lesson-description { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.2rem; margin-left: 2.8rem; }
        .chinese { font-family: var(--font-chinese); font-size: 0.85rem; color: var(--text-chinese); }
        .watch-btn { background: transparent; border: 1px solid var(--accent-border); border-radius: 30px; padding: 0.4rem 1.2rem; font-family: var(--font-serif); font-size: 0.75rem; color: var(--text-accent); cursor: pointer; text-decoration: none; transition: all 0.2s ease; display: inline-block; }
        .watch-btn:hover { background: rgba(166, 107, 58, 0.05); }
        .watch-btn.disabled, .watch-btn.locked { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
        .user-info { display: flex; justify-content: flex-end; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .user-name { font-size: 0.85rem; color: var(--text-secondary); }
        .logout-btn { background: none; border: none; font-family: var(--font-serif); font-size: 0.75rem; color: var(--text-muted); cursor: pointer; }
        .logout-btn:hover { color: var(--text-accent); }
        @media (max-width: 768px) { body { padding: 1rem; } .module-content { padding: 1.25rem; } .stage-title { font-size: 1.5rem; } .lesson-row { flex-direction: column; align-items: flex-start; } .watch-btn { align-self: flex-end; } .lesson-description { margin-left: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="user-info">
            <span class="user-name" id="userName"></span>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>

        <div class="module-card">
            <img src="images/module1.jpg" alt="Ступень 1" class="module-image" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 800 200%22%3E%3Crect width=%22800%22 height=%22200%22 fill=%22%232a241a%22/%3E%3Ctext x=%22400%22 y=%22120%22 text-anchor=%22middle%22 fill=%22%23d6b07a%22 font-size=%2230%22%3E第一阶%3C/text%3E%3C/svg%3E'">
            
            <div class="module-content">
                <a href="dashboard.html" class="back-link">← К программе курса</a>
                
                <div class="stage-number">第一阶</div>
                <div class="stage-title">Фундамент Ба Цзы</div>
                <div class="stage-subtitle">Основы китайской метафизики и структура карты судьбы</div>

                <div class="lessons-list" id="lessonsList"></div>
            </div>
        </div>
    </div>

    <script>
        // Проверка авторизации
        const authData = JSON.parse(localStorage.getItem('baZiAuth') || sessionStorage.getItem('baZiAuth') || 'null');
        if (!authData) window.location.href = 'login.html';
        document.getElementById('userName').textContent = authData.name;
        
        const userAccessLevel = authData.accessLevel || 1;
        const hasAccess = userAccessLevel >= 1;
        
        // ДАННЫЕ УРОКОВ С KINESCOPE (ВСЕ ID ПРОВЕРЕНЫ)
        const lessons = [
    { number: 1, title: 'Пролог', chinese: '', description: 'Введение в курс Ба Цзы. Что такое «зеркало судьбы» и как оно может изменить вашу жизнь.', hasVideo: true, kinescopeId: 'dwr2AhcpCgbTUyk8s1wzp8' },
    { number: 2, title: 'Обо мне', chinese: '', description: 'Об удаче, рыбе и рыбаках.', hasVideo: true, kinescopeId: '9LCoNqe6jX9KSq9EVYeD6p' },
    { number: 3, title: 'Сотворение пяти элементов. Возникновение мира. Крест Хэ Ту', chinese: '河图', description: 'Космогонический миф о происхождении пяти элементов и магический крест Хэ Ту.', hasVideo: true, kinescopeId: 'rXC56ATz9KQm8humtnQRMx' },
    { number: 4, title: 'Трансформация Креста в Пентаграмму. Десять небесных архетипов человека', chinese: '天干', description: 'Как крест Хэ Ту превращается в пентаграмму У-Син. Десять архетипов и их связь с пятью эмоциями.', hasVideo: true, kinescopeId: 'dLJxbV8Lo9BzbJ1jP19RVz' },
    { number: 5, title: 'Примеры пяти эмоций в поэзии', chinese: '五行', description: 'Как пять элементов проявляются через поэтические образы и эмоциональные состояния.', hasVideo: true, kinescopeId: '6Qpj5La9v1aQkPwEdqNYrv' },
    { number: 6, title: 'Дао', chinese: '道', description: 'Найти человека, забывшего слова и поговорить с ним.', hasVideo: true, kinescopeId: '7yyALYD1oWg3bk1xKCqZPH' },
    { number: 7, title: 'Император У-ди и его реформа календаря. Сближение Юпитера и Сатурна', chinese: '太初', description: 'Почему У-ди изменил календарь, создав «Тайчу» (太初) в 104 г. до н.э.', hasVideo: true, kinescopeId: 'bLvB6W2DAsCDkFQu7MvmLW' },
    { number: 8, title: 'Символизм числа 2 и 3 в китайской метафизике', chinese: '太极 · 天地人和', description: 'Тай Цзи (Великий предел) и принцип Тянь Ди Жэнь Хэ И — единство Неба, Земли и Человека.', hasVideo: true, kinescopeId: 'd6Tzr6u5ThcFt6GXNrBGy6' },
    { number: 9, title: 'Десять небесных стволов. Архетип Янского дерева', chinese: '甲木', description: 'Архетип янского дерева в биографии Киану Ривза.', hasVideo: true, kinescopeId: 'reP5Pr9nS5sSZvUG3phEhc' },
    { number: 10, title: 'Пентаграмма у син', chinese: '五行', description: 'Циклы порождения и преодоления пяти элементов.', hasVideo: false },
    { number: 11, title: 'Пять элементов подробно', chinese: '', description: 'Характеристики Дерева, Огня, Земли, Металла, Воды.', hasVideo: false },
    { number: 12, title: '10 небесных стволов', chinese: '天干', description: 'Цзя, И, Бин, Дин, У, Цзи, Гэн, Синь, Жэнь, Гуй.', hasVideo: false },
    { number: 13, title: '12 земных ветвей', chinese: '地支', description: 'Цзы, Чоу, Инь, Мао, Чэнь, Сы, У, Вэй, Шэнь, Ю, Сюй, Хай.', hasVideo: false },
    { number: 14, title: 'Столпы в ба цзы', chinese: '', description: 'Структура четырёх столпов: Год, Месяц, День, Час.', hasVideo: false },
    { number: 15, title: 'Взаимодействие 10 и 12', chinese: '', description: 'Синергия небесных стволов и земных ветвей.', hasVideo: false },
    { number: 16, title: '60-ти летний цикл', chinese: '甲子', description: 'Комбинации стволов и ветвей.', hasVideo: false },
    { number: 17, title: 'Божество Тай Суй', chinese: '太岁', description: 'Годовое божество, направления, обходы.', hasVideo: false },
    { number: 18, title: 'Господин дня', chinese: '日主', description: 'Определение центральной энергии личности.', hasVideo: false }
];        
        const lessonsList = document.getElementById('lessonsList');
        lessonsList.innerHTML = '';
        
        lessons.forEach(lesson => {
            const isAvailable = hasAccess && lesson.hasVideo;
            const hasKinescopeId = lesson.kinescopeId && lesson.kinescopeId.length > 0;
            const canWatch = isAvailable && hasKinescopeId;
            
            const lessonRow = document.createElement('div');
            lessonRow.className = 'lesson-row';
            
            let buttonHtml = '';
            if (canWatch) {
                // Явно формируем ссылку с параметрами
                const href = `lesson.html?stage=1&lesson=${lesson.number}&kinescope=${lesson.kinescopeId}`;
                buttonHtml = `<a href="${href}" class="watch-btn">Смотреть</a>`;
                console.log(`Урок ${lesson.number}: ссылка ${href}`);
            } else if (hasAccess && !lesson.hasVideo) {
                buttonHtml = `<button class="watch-btn disabled" disabled>Скоро</button>`;
            } else {
                buttonHtml = `<button class="watch-btn disabled" disabled>🔒 Закрыто</button>`;
            }
            
            lessonRow.innerHTML = `
                <div class="lesson-info">
                    <span class="lesson-number">${lesson.number}.</span>
                    <div>
                        <div class="lesson-title">
                            <span class="lesson-title-main">${lesson.title}</span>
                            ${lesson.chinese ? `<span class="chinese"> ${lesson.chinese}</span>` : ''}
                        </div>
                        <div class="lesson-description">${lesson.description}</div>
                    </div>
                </div>
                ${buttonHtml}
            `;
            lessonsList.appendChild(lessonRow);
        });
        
        function logout() {
            localStorage.removeItem('baZiAuth');
            sessionStorage.removeItem('baZiAuth');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
